name: Build

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'VERSION'
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    name: Build (per-board)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        board: [beetle, seeed_xiao]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with ESP-IDF (apply defaults and build)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.3
          target: esp32c6
          command: |
            set -euo pipefail
            BOARD=${{ matrix.board }}
            echo "Using defaults for: $BOARD"
            BOARD_DEFS=sdkconfig.defaults.${BOARD}
            if [ ! -f "$BOARD_DEFS" ]; then
              echo "Missing $BOARD_DEFS file" >&2
              exit 1
            fi
            rm -f sdkconfig
            idf.py \
              -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;$BOARD_DEFS" \
              reconfigure
            idf.py -B build-${BOARD} build

      - name: Collect firmware artifact
        run: |
          set -euo pipefail
          BOARD=${{ matrix.board }}
          mkdir -p release-assets
          cp \
            "build-${BOARD}/esp32_mqtt_sensor.bin" \
            "release-assets/esp32_mqtt_sensor-${BOARD}.bin"
          ls -lah release-assets

      - name: Upload firmware artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: release-assets/esp32_mqtt_sensor-${{ matrix.board }}.bin
          if-no-files-found: error

  release:
    name: Create GitHub Release and Upload Firmware
    runs-on: ubuntu-latest
    needs: build
    if: >-
      ${{
        github.event_name == 'push' &&
        (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      }}
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_bump_version: ${{ steps.release.outputs.should_bump_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: firmware-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: |
          set -euo pipefail
          find release-assets -maxdepth 2 -type f -print | sort

      - name: Determine release version
        id: version
        run: |
          set -euo pipefail
          version="$(tr -d '\r\n' < VERSION)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must be MAJOR.MINOR.PATCH, got: $version" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          should_bump_version=false
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists."
            tag_sha="$(git rev-list -n 1 "${TAG}")"
            if [ "${tag_sha}" != "${GITHUB_SHA}" ]; then
              echo "Tag ${TAG} points to ${tag_sha}, not ${GITHUB_SHA}." >&2
              echo "Refusing to publish mismatched release." >&2
              exit 1
            fi
            if gh release view "${TAG}" >/dev/null 2>&1; then
              echo "Release ${TAG} already exists."
            else
              echo "Release ${TAG} missing; creating it for existing tag."
              gh release create "${TAG}" --title "${TAG}" --generate-notes
            fi
          else
            echo "Creating new release ${TAG} from ${GITHUB_SHA}."
            gh release create \
              "${TAG}" \
              --target "${GITHUB_SHA}" \
              --title "${TAG}" \
              --generate-notes
            should_bump_version=true
          fi
          echo "should_bump_version=${should_bump_version}" >> "$GITHUB_OUTPUT"

      - name: Upload firmware assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release-assets/*.bin)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No .bin files found in release-assets" >&2
            exit 1
          fi
          gh release upload "${TAG}" "${files[@]}" --clobber

  bump-version:
    name: Bump VERSION
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.should_bump_version == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump VERSION
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config \
            user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          version="${{ needs.release.outputs.version }}"
          IFS='.' read -r major minor patch <<< "$version"
          patch=$((patch+1))
          new="${major}.${minor}.${patch}"
          echo "$new" > VERSION
          git add VERSION
          git commit -m "ci: bump version to v${new}"
          git push origin HEAD
