name: Build

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'VERSION'
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    name: Build esp32c6
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.3
          target: esp32c6
          command: idf.py build
      - name: Upload firmware artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: esp32_mqtt_sensor.bin
          path: build/esp32_mqtt_sensor.bin

  post-build:
    name: Post-build tasks
    runs-on: ubuntu-latest
    needs: build
    if: ${{ success() }}
    outputs:
      version: ${{ steps.set_version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version output
        id: set_version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Create tag for current VERSION
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          version=${{ steps.set_version.outputs.version }}
          git fetch --tags
          git tag -a "v${version}" -m "CI build v${version}"
          git push origin refs/tags/v${version}

      - name: Bump VERSION
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          version=${{ steps.set_version.outputs.version }}
          IFS='.' read -r major minor patch <<< "$version"
          patch=$((patch+1))
          new="${major}.${minor}.${patch}"
          echo "$new" > VERSION
          git add VERSION
          git commit -m "ci: bump version to v${new}" || echo "No changes to commit"
          git push origin HEAD

  create-release:
    name: Create GitHub Release and Upload Firmware
    runs-on: ubuntu-latest
    needs: post-build
    if: ${{ success() }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: esp32_mqtt_sensor.bin
          path: .

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.post-build.outputs.version }}
          release_name: v${{ needs.post-build.outputs.version }}
          body: Automated release with firmware artifact
          draft: false
          prerelease: false
          generateReleaseNotes: true

      - name: Upload firmware to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./build/esp32_mqtt_sensor.bin
          asset_name: esp32_mqtt_sensor.bin
          asset_content_type: application/octet-stream
